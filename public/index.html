<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Draly Wisdomgrounds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Nunito:wght@400;700;800;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/dralingo.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body class="hub-bg">
  <div class="lantern l1"></div>
  <div class="lantern l2"></div>
  <div class="lantern l3"></div>

  <div class="container hub-home">
    <div class="hub-hero" style="margin-bottom:24px;">
      <div class="dralingo-stage" style="width:min(60vw,260px); height:min(60vw,260px); margin-bottom:8px;">
        <div class="dralingo-rays static"></div>
        <div class="dralingo-orb"></div>
        <div id="dralingo-3d-home" class="dralingo-3d-mount"></div>
        <img src="/assets/dralingo.png" alt="Dralingo" class="dralingo-floating dralingo-2d-fallback">
      </div>
      <h1 class="hub-title" style="font-size:clamp(1.8rem,5vw,2.8rem);">Draly Wisdomgrounds</h1>
      <p class="hub-tagline" style="margin-top:4px;">Where wisdom takes flight 🐉</p>
    </div>

    <div class="card" style="width:100%; max-width:400px; margin-bottom:14px;">
      <div style="display:flex; flex-direction:column; gap:10px;">
        <input class="input" id="home-pin" type="tel" maxlength="4" placeholder="Game PIN" inputmode="numeric" autocomplete="off">
        <input class="input" id="home-name" type="text" maxlength="20" placeholder="Your name" autocomplete="given-name">
        <button class="btn btn-jade btn-xl" id="home-join-btn">🎮 &nbsp; JOIN</button>
        <p id="home-error" style="color:var(--red-glow); text-align:center; font-size:0.9rem; min-height:1em; margin:0;"></p>
      </div>
    </div>

    <div id="rematch-wrap" style="width:100%; max-width:400px; margin-bottom:24px; display:none;">
      <button class="btn btn-gold btn-xl" id="rematch-btn" style="width:100%;">
        🔄 &nbsp; REMATCH<span id="rematch-name-suffix"></span>
      </button>
    </div>

    <a href="/games.html" class="hub-host-link" id="host-link">
      👑 Host a battle &nbsp;→
    </a>
  </div>

  <script src="/js/sounds.js"></script>
  <script src="/js/enter.js"></script>
  <script type="module">
    // Try mounting the 3D Dralingo. If WebGL is unavailable, the 2D fallback stays visible.
    try {
      const m = await import('/js/dralingo-3d.js');
      const Dralingo3D = m.default;
      const container = document.getElementById('dralingo-3d-home');
      if (container) {
        const handle = await Dralingo3D.mount(container, {
          variant: 'flying',
          hover: true,
          rotate: true,
          glow: true,
          onReady: () => {
            // Hide 2D fallback once the 3D model is rendered
            document.querySelectorAll('.dralingo-2d-fallback').forEach((el) => el.style.display = 'none');
          }
        });
        // Preload other variants for legendary appearances
        Dralingo3D.preload('emperor');
        Dralingo3D.preload('eating');
      }
    } catch (e) {
      console.warn('3D Dralingo unavailable, using 2D image fallback', e);
    }
  </script>
  <script>
    // If URL contains ?pin=X, jump to player flow
    const params = new URLSearchParams(location.search);
    if (params.get('pin')) {
      location.href = '/player.html' + location.search;
    }

    // Restore the rematch button if we have a recent saved game
    const REMATCH_KEY = 'dralyLastJoin';
    const REMATCH_MAX_AGE_MS = 4 * 60 * 60 * 1000; // 4 hours
    let saved = null;
    try {
      const raw = localStorage.getItem(REMATCH_KEY);
      if (raw) saved = JSON.parse(raw);
    } catch (e) { /* ignore */ }

    if (saved && saved.pin && saved.name && saved.ts && Date.now() - saved.ts < REMATCH_MAX_AGE_MS) {
      const wrap = document.getElementById('rematch-wrap');
      wrap.style.display = 'block';
      document.getElementById('rematch-name-suffix').textContent = ' AS ' + saved.name.toUpperCase();
      // Pre-fill the inputs too for convenience
      document.getElementById('home-pin').value = saved.pin;
      document.getElementById('home-name').value = saved.name;
      document.getElementById('rematch-btn').onclick = () => {
        if (window.MochiSounds) MochiSounds.join();
        location.href = `/player.html?pin=${encodeURIComponent(saved.pin)}&name=${encodeURIComponent(saved.name)}&autojoin=1`;
      };
    }

    // Join flow — same destination as Rematch but uses the typed inputs
    document.getElementById('home-join-btn').addEventListener('click', tryJoin);
    document.getElementById('home-pin').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('home-name').focus(); });
    document.getElementById('home-name').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryJoin(); });

    function tryJoin() {
      const pin = document.getElementById('home-pin').value.trim();
      const name = document.getElementById('home-name').value.trim();
      const err = document.getElementById('home-error');
      if (!pin || !name) {
        err.textContent = 'Enter PIN and name';
        return;
      }
      err.textContent = '';
      if (window.MochiSounds) MochiSounds.join();
      location.href = `/player.html?pin=${encodeURIComponent(pin)}&name=${encodeURIComponent(name)}&autojoin=1`;
    }
  </script>
</body>
</html>
