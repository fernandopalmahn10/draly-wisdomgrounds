<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Market Clash · Host</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Long+Cang&family=Nunito:wght@400;700;800;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/dralingo.css">
  <link rel="stylesheet" href="/css/color-clash.css">
</head>
<body class="market-bg">
  <div class="lantern l1"></div>
  <div class="lantern l2"></div>

  <button class="muted-toggle" id="mute-btn">🔊 On</button>

  <!-- LOBBY -->
  <div id="screen-lobby" class="container">
    <div style="text-align:center; margin-bottom:16px;">
      <div class="market-banner">🏮 集市冲突 · Market Clash 🥟</div>
      <div style="color:var(--ink-dim); font-weight:700; letter-spacing:0.1em; margin-top:8px;">GAME PIN</div>
      <div class="pin-display" id="pin-display">····</div>
      <div style="color:var(--ink-dim); font-size:0.9rem;">
        Players go to <span id="join-url" style="color:var(--gold-glow); font-weight:800;">this URL</span>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:14px;">
        <div style="font-size:2rem;">📚</div>
        <div style="flex:1;">
          <div style="font-size:0.75rem; color:var(--ink-dim); letter-spacing:0.15em; text-transform:uppercase;">Set Loaded</div>
          <div id="set-title-display" style="font-weight:800; font-size:1.15rem;">…</div>
          <div id="set-count-display" style="color:var(--ink-dim); font-size:0.85rem;">…</div>
          <div id="images-progress-badge" style="margin-top:6px; font-size:0.85rem; color:var(--gold-glow); display:none;">
            🔥 <span id="images-progress-text">0/0</span> images ready
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="location.href='/games.html?setId=' + new URLSearchParams(location.search).get('setId')">Change Game</button>
      </div>

      <div class="duration-control">
        <span>⏱ Duration</span>
        <input type="range" id="duration-slider" min="60" max="600" step="30" value="180">
        <span class="duration-value" id="duration-value">3m</span>
      </div>
    </div>

    <div class="host-grid">
      <div class="team-panel team-red">
        <div class="team-header">
          <div class="team-mascot">🏮</div>
          <div>
            <div class="team-name">Team Lantern</div>
            <div style="color:var(--ink-dim); font-size:0.85rem;">紅燈籠</div>
          </div>
        </div>
        <div class="player-chips" id="players-red"></div>
      </div>
      <div class="team-panel team-gold">
        <div class="team-header">
          <div class="team-mascot">🥟</div>
          <div>
            <div class="team-name">Team Dumpling</div>
            <div style="color:var(--ink-dim); font-size:0.85rem;">餃子</div>
          </div>
        </div>
        <div class="player-chips" id="players-gold"></div>
      </div>
    </div>

    <p style="text-align:center; color:var(--ink-dim); font-size:0.85rem; margin-top:12px;">
      Tap a player chip to swap their team
    </p>

    <div class="controls-panel">
      <div class="controls-row" style="justify-content:center;">
        <button class="btn btn-ghost" id="balance-btn">⚖️ Auto-balance</button>
        <button class="btn btn-jade" id="start-btn" disabled>▶️ Open the Market</button>
      </div>
    </div>
  </div>

  <!-- COUNTDOWN -->
  <div id="screen-countdown" class="hidden countdown-overlay">
    <div class="countdown-num" id="countdown-num">3</div>
  </div>

  <!-- ACTIVE — top-down market map -->
  <div id="screen-active" class="hidden cc-container">
    <div class="sticky-pin">
      <span class="sticky-pin-label">PIN</span>
      <span class="sticky-pin-value" id="active-pin-display">····</span>
    </div>
    <div class="cc-topbar">
      <div class="cc-team-bar red" id="cc-bar-red">
        <span class="cc-team-emoji">🏮</span>
        <span class="cc-team-pct" id="pct-red">0%</span>
      </div>
      <div class="cc-time">
        <span id="timer-display">180</span>
      </div>
      <div class="cc-team-bar gold" id="cc-bar-gold">
        <span class="cc-team-pct" id="pct-gold">0%</span>
        <span class="cc-team-emoji">🥟</span>
      </div>
    </div>

    <div class="cc-stage">
      <!-- Lanterns float outside the tilted board, above it -->
      <div class="cc-lantern" style="top:6%; left:5%;">🏮</div>
      <div class="cc-lantern" style="top:4%; right:7%;">🏮</div>
      <div class="cc-lantern" style="bottom:14%; left:8%;">🏮</div>
      <div class="cc-lantern" style="bottom:16%; right:6%;">🏮</div>
      <div class="cc-market-floor">
        <div class="cc-grid" id="cc-grid"></div>
        <div class="cc-players" id="cc-players"></div>
      </div>
    </div>

    <div style="text-align:center; padding:8px;">
      <button class="btn btn-ghost btn-sm" id="end-now-btn">🛑 Close the Market</button>
    </div>
  </div>

  <!-- WIN -->
  <div id="screen-win" class="hidden container">
    <div class="win-screen">
      <div id="win-emoji" style="font-size:7rem;">🎉</div>
      <div class="winner-banner" id="win-banner">Team Lantern Wins!</div>
      <div class="final-scores">
        <div><span class="red" id="final-red">0%</span></div>
        <div style="color:var(--ink-dim);">vs</div>
        <div><span class="gold" id="final-gold">0%</span></div>
      </div>
      <div style="display:flex; gap:12px; margin-top:24px;">
        <button class="btn btn-ghost" onclick="location.href='/'">🏠 Inicio</button>
        <button class="btn btn-jade" id="play-again-btn">🔄 Nueva ronda</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/sounds.js"></script>
  <script src="/js/enter.js"></script>
  <script src="/js/dralingo.js"></script>
  <script src="/js/host-clash.js"></script>
</body>
</html>
